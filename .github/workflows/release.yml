name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tabbit-bridge dist/
          tar -czf tabbit-bridge-${{ matrix.target }}.tar.gz -C dist tabbit-bridge
          shasum -a 256 tabbit-bridge-${{ matrix.target }}.tar.gz > tabbit-bridge-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/tabbit-bridge.exe dist/
          Compress-Archive -Path dist/tabbit-bridge.exe -DestinationPath tabbit-bridge-${{ matrix.target }}.zip
          $hash = (Get-FileHash tabbit-bridge-${{ matrix.target }}.zip -Algorithm SHA256).Hash
          "$hash  tabbit-bridge-${{ matrix.target }}.zip" | Out-File -Encoding ascii tabbit-bridge-${{ matrix.target }}.zip.sha256

      - name: Hash install scripts (unix)
        if: runner.os != 'Windows'
        run: |
          # 把脚本与对应 sha256 复制到根目录，避免 release 上文件名带 scripts/ 前缀
          for f in install.sh install.ps1 tb tb.sh; do
            cp "scripts/$f" "$f"
            # sha256 文件内容用裸文件名，便于下载后 sha256sum -c 校验
            (cd "$(dirname "$f")" && shasum -a 256 "$(basename "$f")") > "$f.sha256"
          done

      - name: Hash install scripts (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($f in @('install.sh','install.ps1','tb','tb.sh')) {
            Copy-Item "scripts/$f" "$f"
            $h = (Get-FileHash "$f" -Algorithm SHA256).Hash
            "$h  $f" | Out-File -Encoding ascii "$f.sha256"
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          make_latest: true
          files: |
            tabbit-bridge-${{ matrix.target }}.*
            install.sh
            install.sh.sha256
            install.ps1
            install.ps1.sha256
            tb.sh
            tb.sh.sha256
            tb
            tb.sha256
