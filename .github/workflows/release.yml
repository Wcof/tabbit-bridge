name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 当前仅提供 macOS（Apple Silicon）。Linux/Windows 暂不构建。
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macos)
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tabbit-bridge dist/
          tar -czf tabbit-bridge-${{ matrix.target }}.tar.gz -C dist tabbit-bridge
          shasum -a 256 tabbit-bridge-${{ matrix.target }}.tar.gz > tabbit-bridge-${{ matrix.target }}.tar.gz.sha256

      - name: Hash install scripts
        run: |
          # 把脚本与对应 sha256 复制到根目录，避免 release 上文件名带 scripts/ 前缀
          for f in install.sh install.ps1 tb tb.sh; do
            cp "scripts/$f" "$f"
            (cd "$(dirname "$f")" && shasum -a 256 "$(basename "$f")") > "$f.sha256"
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          make_latest: true
          files: |
            tabbit-bridge-${{ matrix.target }}.*
            install.sh
            install.sh.sha256
            install.ps1
            install.ps1.sha256
            tb.sh
            tb.sh.sha256
            tb
            tb.sha256
